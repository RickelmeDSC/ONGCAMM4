version: "3.8"

services:
  backend:
    build: ./Back-end
    container_name: camm4-backend
    restart: unless-stopped
    env_file: ./Back-end/.env
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./Front-end
    container_name: camm4-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  uploads:
