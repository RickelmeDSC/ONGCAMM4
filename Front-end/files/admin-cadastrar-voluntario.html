<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
  <title>CAMM — Cadastro de Voluntário</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="cadastrar-voluntario">

  <button class="hamburger" id="hamburger"><i data-lucide="menu" style="width:22px;height:22px"></i></button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="assets/logo-camm.png" alt="CAMM" style="width:100px;height:auto;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.15))">
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item" data-page="home"       onclick="window.location.href='home.html'">      <span class="nav-icon"><i data-lucide="home" style="width:18px;height:18px"></i></span> Home</button>
      <button class="nav-item" data-page="dashboard" onclick="window.location.href='dashboard.html'"><span class="nav-icon"><i data-lucide="layout-dashboard" style="width:18px;height:18px"></i></span> Dashboard</button>
      <button class="nav-item" data-page="cadastros"  onclick="window.location.href='cadastros.html'"> <span class="nav-icon"><i data-lucide="user-round" style="width:18px;height:18px"></i></span> Cadastros</button>
      <button class="nav-item" data-page="frequencia" onclick="window.location.href='frequencia.html'"><span class="nav-icon"><i data-lucide="clipboard-list" style="width:18px;height:18px"></i></span> Frequência</button>
      <button class="nav-item active" data-page="admin" onclick="window.location.href='admin.html'">   <span class="nav-icon"><i data-lucide="settings" style="width:18px;height:18px"></i></span> Administrativo</button>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-avatar" id="sidebar-avatar">U</div>
      <span class="sidebar-user-name" id="sidebar-username">Usuário</span>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">Cadastro de Voluntário</h1>
    </div>

    <div class="card" style="max-width:680px">
      <form id="form-voluntario" novalidate>

        <p class="form-section-title">Informações Pessoais</p>

        <div style="display:flex;flex-direction:column;gap:16px">
          <div class="form-group">
            <label class="form-label">Nome completo</label>
            <input id="v-nome" type="text" class="form-input" placeholder="Ex: João da Silva Santos" required>
          </div>

          <div class="form-row cols-2">
            <div class="form-group">
              <label class="form-label">Email</label>
              <input id="v-email" type="email" class="form-input" placeholder="exemplo@ong.org" required>
            </div>
            <div class="form-group">
              <label class="form-label">CPF</label>
              <input id="v-cpf" type="text" class="form-input" placeholder="000.000.000-00" data-mask="cpf">
            </div>
          </div>

          <div class="form-row cols-2">
            <div class="form-group">
              <label class="form-label">Número para contato</label>
              <input id="v-tel" type="text" class="form-input" placeholder="(00) 00000-0000" data-mask="phone">
            </div>
            <div class="form-group">
              <label class="form-label">Cargo/Função</label>
              <select id="v-cargo" class="form-select" required>
                <option value="">Selecione a função</option>
                <option value="voluntario">Voluntário (Nível 1)</option>
                <option value="gestor">Gestor (Nível 2)</option>
                <option value="diretor">Diretor (Nível 3)</option>
              </select>
            </div>
          </div>

          <div style="height:1px;background:var(--border);margin:8px 0"></div>
          <p class="form-section-title">Segurança e Acesso</p>

          <div class="form-row cols-2">
            <div class="form-group">
              <label class="form-label">Senha</label>
              <div style="position:relative">
                <input id="v-senha" type="password" class="form-input" placeholder="••••••••" required>
                <button type="button" class="input-eye">👁</button>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Confirmar senha</label>
              <div style="position:relative">
                <input id="v-conf" type="password" class="form-input" placeholder="••••••••" required>
                <button type="button" class="input-eye">👁</button>
              </div>
            </div>
          </div>

          <p style="font-size:12px;color:var(--paragrafo)">
            A senha deve ter mínimo 8 caracteres, uma letra maiúscula, uma minúscula, um número e um caractere especial.
          </p>

          <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:8px">
            <button type="button" class="btn btn-outline" onclick="window.location.href='admin.html'">Cancelar</button>
            <button type="submit" class="btn btn-primary">Salvar Cadastro</button>
          </div>
        </div>
      </form>
    </div>
  </main>

  <div id="toast-container" class="toast-container"></div>
  <script src="app.js"></script>
  <script>lucide.createIcons();</script>
<script src="https://va.vercel-scripts.com/v1/speed-insights/script.js" defer></script>
<script src="https://va.vercel-scripts.com/v1/analytics/script.js" defer></script>
</body>
</html>
