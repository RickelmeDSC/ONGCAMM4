<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAMM — Frequência</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="frequencia">

  <button class="hamburger" id="hamburger"><i data-lucide="menu" style="width:22px;height:22px"></i></button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="logo-camm.png" alt="CAMM" style="width:100px;height:auto;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.15))">
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item" data-page="home"       onclick="window.location.href='cadastros.html'">      <span class="nav-icon"><i data-lucide="home" style="width:18px;height:18px"></i></span> Home</button>
      <button class="nav-item" data-page="cadastros"  onclick="window.location.href='cadastros.html'"> <span class="nav-icon"><i data-lucide="user-round" style="width:18px;height:18px"></i></span> Cadastros</button>
      <button class="nav-item active" data-page="frequencia" onclick="window.location.href='frequencia.html'"><span class="nav-icon"><i data-lucide="clipboard-list" style="width:18px;height:18px"></i></span> Frequência</button>
      <button class="nav-item" data-page="admin"      onclick="window.location.href='admin.html'">     <span class="nav-icon"><i data-lucide="settings" style="width:18px;height:18px"></i></span> Administrativo</button>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-avatar" id="sidebar-avatar">U</div>
      <span class="sidebar-user-name" id="sidebar-username">Usuário</span>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">Frequência das crianças</h1>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <input id="freq-date" type="date" class="form-input" style="width:180px">
        <button class="btn btn-outline" onclick="gerarRelatorioFrequencia()" id="btn-relatorio-freq"><i data-lucide="file-text" style="width:14px;height:14px"></i> Gerar PDF</button>
        <button class="btn btn-primary" id="btn-salvar-chamada"><i data-lucide="save" style="width:14px;height:14px"></i> Salvar Chamada</button>
      </div>
    </div>

    <!-- Busca -->
    <div class="search-bar">
      <div class="search-input-wrap" style="max-width:320px">
        <span class="search-icon"><i data-lucide="search" style="width:16px;height:16px"></i></span>
        <input id="search-freq" type="text" class="form-input" placeholder="Buscar por nome da criança">
      </div>
      <div style="flex:1;max-width:180px">
        <input type="date" class="form-input">
      </div>
      <button class="btn btn-primary btn-sm">Filtrar</button>
    </div>

    <!-- Tabela -->
    <div class="table-wrapper">
      <table class="data-table">
        <thead>
          <tr>
            <th>Matrícula</th>
            <th>Nome</th>
            <th>Última presença</th>
            <th>Status de frequência</th>
            <th>Visualizar</th>
          </tr>
        </thead>
        <tbody id="freq-tbody">
          <!-- preenchido via app.js -->
        </tbody>
      </table>
      <div class="table-footer">
        <div class="lines-per-page">
          <select><option>5</option><option>15</option><option>30</option></select>
          Linhas / Páginas
        </div>
        <div class="pagination">
          <button class="page-btn">‹</button>
          <button class="page-btn active">1</button>
          <button class="page-btn">2</button>
          <button class="page-btn">3</button>
          <button class="page-btn">›</button>
        </div>
      </div>
    </div>
  </main>

  <div id="toast-container" class="toast-container"></div>
  <script src="app.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
